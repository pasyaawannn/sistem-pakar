{% extends "base.html" %}
{% block title %}Register - StockExpert ID{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>Buat Akun</h1>
            <p>Mulai analisis saham dengan AI</p>
        </div>

        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="form-group">
                <label><i class="fas fa-id-card"></i> Nama Lengkap</label>
                <input type="text" name="full_name" required placeholder="Nama lengkap kamu">
            </div>
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" name="username" required placeholder="Pilih username">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" required placeholder="Buat password" minlength="6">
            </div>
            <button type="submit" class="btn-primary">
                <i class="fas fa-user-plus"></i> Daftar
            </button>
        </form>

        <div class="auth-footer">
            <p>Sudah punya akun? <a href="{{ url_for('login') }}">Login di sini</a></p>
        </div>
    </div>

    <div class="auth-decoration">
        <div class="glow-circle"></div>
        <div class="glow-circle-2"></div>
    </div>
</div>
{% endblock %}
