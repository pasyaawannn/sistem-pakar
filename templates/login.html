{% extends "base.html" %}
{% block title %}Login - StockExpert ID{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo">
                <i class="fas fa-chart-line"></i>
            </div>
            <h1>StockExpert ID</h1>
            <p>Sistem Pakar Analisis Saham Indonesia</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}" class="auth-form">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" name="username" required placeholder="Masukkan username" autocomplete="username">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" required placeholder="Masukkan password" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="auth-footer">
            <p>Belum punya akun? <a href="{{ url_for('register') }}">Daftar sekarang</a></p>
        </div>
    </div>

    <div class="auth-decoration">
        <div class="glow-circle"></div>
        <div class="glow-circle-2"></div>
        <div class="floating-icons">
            <i class="fas fa-chart-bar"></i>
            <i class="fas fa-coins"></i>
            <i class="fas fa-arrow-trend-up"></i>
            <i class="fas fa-building"></i>
        </div>
    </div>
</div>
{% endblock %}
